name: Build And Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 and Qt
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-multimedia

      - name: Configure
        shell: msys2 {0}
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: msys2 {0}
        run: cmake --build build

      - name: Prepare Windows package
        shell: msys2 {0}
        run: |
          set -euo pipefail
          mkdir -p package/SyncMusicPlayer-Windows
          cp build/sync-music-player.exe package/SyncMusicPlayer-Windows/
          cp -r build/music package/SyncMusicPlayer-Windows/music
          windeployqt6.exe --no-translations --release package/SyncMusicPlayer-Windows/sync-music-player.exe

          package_root="package/SyncMusicPlayer-Windows"
          changed=1
          while [ "$changed" -ne 0 ]; do
            changed=0
            while IFS= read -r -d '' binary; do
              while IFS= read -r dep; do
                dep_path="/mingw64/bin/$dep"
                if [ -f "$dep_path" ] && [ ! -f "$package_root/$dep" ]; then
                  cp "$dep_path" "$package_root/"
                  changed=1
                fi
              done < <(
                objdump -p "$binary" \
                  | sed -n 's/^[[:space:]]*DLL Name: //p'
              )
            done < <(
              find "$package_root" -type f \( -iname '*.exe' -o -iname '*.dll' \) -print0
            )
          done

      - name: Archive Windows package
        shell: pwsh
        run: Compress-Archive -Path package/SyncMusicPlayer-Windows -DestinationPath sync-music-player-windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-music-player-windows
          path: sync-music-player-windows.zip
          if-no-files-found: error

  build-linux:
    name: Build Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-multimedia-dev

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Prepare Linux package
        run: |
          set -euo pipefail
          mkdir -p package/SyncMusicPlayer-Linux
          cp build/sync-music-player package/SyncMusicPlayer-Linux/
          cp -r build/music package/SyncMusicPlayer-Linux/music
          cat > package/SyncMusicPlayer-Linux/README-LINUX.txt <<'EOF'
          Run:
            ./sync-music-player

          Optional logs:
            ./sync-music-player --dev

          Note:
            This Linux archive contains the built application and the music folder.
            On another Linux system you may still need compatible system libraries
            and Qt 6 runtime packages if they are not already installed.
          EOF

      - name: Archive Linux package
        run: tar -czf sync-music-player-linux.tar.gz -C package SyncMusicPlayer-Linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-music-player-linux
          path: sync-music-player-linux.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sync-music-player-windows
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: sync-music-player-linux
          path: release-assets/linux

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/windows/sync-music-player-windows.zip
            release-assets/linux/sync-music-player-linux.tar.gz
